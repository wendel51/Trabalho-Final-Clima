<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Seca de 2019 - 2020</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Open Sans', sans-serif; overflow: hidden; }
        #container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Sidebar Base */
        .sidebar {
            background: #fdfaf6;
            z-index: 1001;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Sidebar Esquerda */
        #sidebar { width: 22%; min-width: 280px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #sidebar.collapsed { margin-left: -22%; min-width: 0; }

        /* Sidebar Direita */
        #sidebar-right { width: 180px; border-left: 1px solid #e0dcd5; padding: 15px; }
        #sidebar-right.collapsed { margin-right: -180px; padding: 0; border: none; }

        /* Botões de Toggle */
        .toggle-btn {
            position: absolute;
            top: 20px;
            width: 30px;
            height: 30px;
            background: #8b4513;
            color: white;
            border: none;
            cursor: pointer;
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #toggle-left { right: -40px; } /* Fica "pendurado" para fora */
        #toggle-right { left: -40px; }
        
        .leaflet-top.leaflet-left {
             margin-top: 55px !important; /* Ajuste esse valor conforme necessário */
        }
        
        /* Conteúdo Interno */
        .sidebar-header { flex-shrink: 0; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #e0dcd5; }
        .sidebar-content { flex-grow: 1; overflow-y: auto; padding: 15px; min-width: 250px; }

        /* Mapa */
        #map { flex-grow: 1; height: 100%; z-index: 1; }
        
        /* Legenda - Agora reage à sidebar direita */
        .legend {
            position: absolute; 
            bottom: 30px; 
            right: 20px; /* Distância fixa da borda direita da tela */
            background: white; 
            padding: 10px; 
            border-radius: 5px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            z-index: 1000; 
            font-size: 11px;
            transition: transform 0.4s ease; /* Move junto com a sidebar */
        }
        
        /* Quando a sidebar direita está aberta, empurramos a legenda para a esquerda */
        body:not(.right-collapsed) .legend {
            transform: translateX(-190px);
        }

        /* Estilos de textos */
        #sidebar h1 { color: #8b4513; font-family: 'Cinzel', serif; font-size: 1.2em; }
        .layer-item { margin-top: 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85em; }
        .info-box h2 { color: #d2691e; margin: 0 0 10px 0; font-family: 'Cinzel', serif; font-size: 1.1em; }
        .data-row { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; font-size: 0.9em;}
        .data-label { font-weight: bold; color: #8b4513; }
        .btn-voltar-sidebar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid #d2691e; margin-right: 12px; display: block;}
        .btn-voltar-sidebar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class=""> 
    <div id="container">
        <div id="sidebar" class="sidebar">
            <button class="toggle-btn" id="toggle-left">◀</button>
            <div class="sidebar-header">
                <a href="index.html" class="btn-voltar-sidebar">
                    <img src="home.png" alt="Voltar">
                </a>
                <strong style="font-family: 'Cinzel'; color: #d2691e;">HOME</strong>
            </div>
            <div class="sidebar-content">
                <h1>Seca de 2019 - 2020</h1>
                
                <div id="info-dinamica">
                    <p style="color: #777; font-style: italic; font-size: 0.9em;"></p>
                </div>
            </div>
        </div>

        <div id="map"></div>
        
        <div id="sidebar-right" class="sidebar">
            <button class="toggle-btn" id="toggle-right">▶</button>
            <h2 style="font-family: 'Cinzel'; font-size: 1em; color: #8b4513;">Camadas</h2>
            <div class="layer-item">
                 <input type="checkbox" id="check-limite" checked>
                <label for="check-limite">Limite Estadual</label>
            </div>
            <div class="layer-item">
                 <input type="checkbox" id="check-irai">
                <label for="check-irai">Seca Represa do Rio Iraí (2019-2020)</label>
             </div> 
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([-24.6, -51.5], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // --- LÓGICA DE RECOLHIMENTO (COLLAPSE) ---
    const btnLeft = document.getElementById('toggle-left');
    const btnRight = document.getElementById('toggle-right');
    const sideLeft = document.getElementById('sidebar');
    const sideRight = document.getElementById('sidebar-right');

    btnLeft.addEventListener('click', () => {
        sideLeft.classList.toggle('collapsed');
        btnLeft.innerText = sideLeft.classList.contains('collapsed') ? '▶' : '◀';
        setTimeout(() => { map.invalidateSize(); }, 400); 
    });

    btnRight.addEventListener('click', () => {
        sideRight.classList.toggle('collapsed');
        document.body.classList.toggle('right-collapsed'); 
        btnRight.innerText = sideRight.classList.contains('collapsed') ? '◀' : '▶';
        setTimeout(() => { map.invalidateSize(); }, 400);
    });

    // --- RESTANTE DAS SUAS FUNÇÕES ORIGINAIS ---
    let limiteParana;

    fetch('PR_LIMITE.geojson')
        .then(res => res.json())
        .then(data => {
            limiteParana = L.geoJSON(data, {
                style: { color: "#444", weight: 1.5, fillOpacity: 0, interactive: false }
            }).addTo(map);
        });

    document.getElementById('check-limite').addEventListener('change', function() {
        if (this.checked) map.addLayer(limiteParana);
        else map.removeLayer(limiteParana);
    });

    const limitesIrai = [
        [-25.4402146, -49.1401437],
        [-25.3693822, -49.0572511]
    ];

    const imagensTimeLapse = [
        'irai-19-1.png',
        'irai-19-2.png',
        'irai-20-2.png',
        'irai-21-1.png',
        'irai-22-1.png'
    ];

    let indiceAtual = 0;
    let camadaImagemAtual = null;
    let intervaloIrai; 

    function rodarTimeLapse() {
        if (camadaImagemAtual) {
            map.removeLayer(camadaImagemAtual);
        }
        camadaImagemAtual = L.imageOverlay(imagensTimeLapse[indiceAtual], limitesIrai, {
            opacity: 0.9,
            crossOrigin: true
        }).addTo(map);
        
        indiceAtual = (indiceAtual + 1) % imagensTimeLapse.length; 
    }

    document.getElementById('check-irai').addEventListener('change', function() {
        if (this.checked) {
            map.fitBounds(limitesIrai); 
            
            rodarTimeLapse(); 
            intervaloIrai = setInterval(rodarTimeLapse, 1300); 
        } else {
            clearInterval(intervaloIrai);
            if (camadaImagemAtual) {
                map.removeLayer(camadaImagemAtual);
                camadaImagemAtual = null;
            }
        }
    });
</script>

</body>
</html>
